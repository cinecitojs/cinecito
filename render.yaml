# ============================================================
# Render Blueprint — Cinecito
# Despliega DOS servicios desde este repo:
#   1) cinecito-api  → Web Service (Node + Socket.IO)
#   2) cinecito-web  → Static Site (build de Vite)
#
# Uso: en Render → New → Blueprint → conectar este repo.
# Render pedirá los valores marcados `sync: false` (secretos) al aplicar.
# La base de datos es Supabase (externa): NO se crea Postgres en Render.
# ============================================================

services:
  # ── Backend / API ─────────────────────────────────────────
  - type: web
    runtime: node
    name: cinecito-api
    region: oregon              # cerca de Supabase us-west-2
    branch: main
    rootDir: apps/api
    plan: free                  # ⚠️ free duerme tras inactividad (cold start ~30s).
                                # Para watch-parties siempre activas: subir a "starter".
    # --include=dev es OBLIGATORIO: NODE_ENV=production hace que npm omita las
    # devDependencies, pero el build necesita typescript (tsc) y prisma (CLI).
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build
    startCommand: npm run start # node dist/src/index.js (runtime solo usa dependencies)
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # PORT lo inyecta Render automáticamente (el server lo lee de process.env.PORT).
      - key: DATABASE_URL
        sync: false             # Supabase: usar el POOLER de sesión (IPv4) + ?sslmode=require
      - key: JWT_SECRET
        generateValue: true     # Render genera un secreto fuerte y estable
      - key: FRONTEND_URL
        sync: false             # origen del front para CORS, ej. https://cinecito-web.onrender.com
      - key: TRUST_PROXY
        value: "true"           # Render está detrás de proxy → IP real del cliente para el rate-limit
      - key: ADMIN_EMAILS
        value: cinecitojs@gmail.com
      # ── Redis (estado de sala compartido / persistente) ─────
      # Render inyecta la connection string interna del Key Value de abajo.
      # Beneficio en UNA sola instancia: el estado de sincronización (roomSession),
      # typing y rate-limit sobreviven a cada redeploy (antes vivían en memoria y se
      # perdían al reiniciar). Habilita además el adaptador de Socket.IO.
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: cinecito-redis
          property: connectionString
      # ── Opcionales: agregar en el panel si se usan ──────────
      # Apoyo voluntario / pagos:
      #   KOFI_VERIFICATION_TOKEN   (Ko-fi → More → Webhooks → Verification Token)
      #   STRIPE_WEBHOOK_SECRET / MP_WEBHOOK_SECRET
      # Subida de archivos (Cloudflare R2):
      #   R2_ENDPOINT / R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_BUCKET_NAME / R2_PUBLIC_URL
      # Observabilidad:
      #   SENTRY_DSN / METRICS_BEARER_TOKEN
      #
      # ⚠️ Escala horizontal (numInstances > 1): NO subir todavía. El estado de la
      # videollamada (voiceRooms/voiceWaiting en webrtc/signaling.ts) vive en memoria
      # del proceso y aún NO está en Redis → con 2+ instancias el cupo de 4 y la lista
      # de espera quedarían inconsistentes. Mantener numInstances = 1 hasta migrarlo.

  # ── Frontend / Web (estático) ─────────────────────────────
  - type: web
    runtime: static
    name: cinecito-web
    branch: main
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    # Headers de seguridad (sin CSP estricta para no romper embeds de video / SPA).
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    # SPA: toda ruta desconocida sirve index.html (React Router en BrowserRouter).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false             # URL pública del API, ej. https://cinecito-api.onrender.com

  # ── Redis / Key Value (estado de sala compartido y persistente) ──
  # Solo accesible internamente (ipAllowList vacío) → la API se conecta por la URL
  # interna que inyecta `fromService` arriba. allkeys-lru: si se llena, descarta lo
  # más viejo en vez de rechazar escrituras (nuestras claves son chicas y con TTL).
  - type: keyvalue
    name: cinecito-redis
    region: oregon              # misma región que la API para latencia interna baja
    plan: free                  # 25 MB; suficiente para sesiones/typing/rate-limit
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []             # [] = sin acceso externo (solo servicios internos)
